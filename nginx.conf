upstream frappe_backend {
    server backend:8000 fail_timeout=0;
}

upstream frappe_socketio {
    server websocket:9000 fail_timeout=0;
}

server {
    listen 8080;
    server_name _;

    client_max_body_size 50m;
    proxy_read_timeout 120;

    # Compiled JS/CSS bundles (built by bench build into sites/assets/)
    location /assets {
        alias /home/frappe/frappe-bench/sites/assets;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Uploaded private/public files
    location ~ ^/sites/[^/]+/public/ {
        root /home/frappe/frappe-bench;
        try_files $uri =404;
    }

    # WebSocket (Socket.IO)
    location /ws {
        proxy_pass http://frappe_socketio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else → Frappe gunicorn
    location / {
        proxy_pass http://frappe_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
